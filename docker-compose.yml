services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pecunity
      POSTGRES_PASSWORD: pecunity
      POSTGRES_DB: pecunity
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  db-test:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pecunity
      POSTGRES_PASSWORD: pecunity
      POSTGRES_DB: pecunity_test
    ports:
      - "5433:5432"

volumes:
  pgdata:
